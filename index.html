<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Steam - 服務暫時無法使用</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Steam</h1>
    </header>

    <main>
        <h2>503 Service Unavailable</h2>
        <p>別擔心，您的購物車很安全。</p>
        <p>目前伺服器受到大量玩家熱情擁擠，我們正在全力搶修。</p>

        <div id="interactive-area">
            <p>網頁將在 <span id="countdown">30</span> 秒後自動重試連線...</p>
            <button id="valve-btn">點擊轉動閥門協助發電</button>
        </div>
    </main>
    <script src="script.js"></script>
    </body>
